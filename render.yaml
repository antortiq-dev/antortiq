services:
  - type: web
    name: antortiq
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO
        value: hello@antortiq.com
