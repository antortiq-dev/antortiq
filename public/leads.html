<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Antortiq — Lead Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{ --red:#e8344a; --red-deep:#d11f1f; --black:#0c0c0c; --disp:'Sora',Arial,sans-serif; --sans:'Inter',Arial,sans-serif; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:var(--sans); background:var(--black); color:#e9e9ea; padding:50px 28px 100px;}
.wrap{max-width:1180px; margin:0 auto;}
.head{margin-bottom:32px;}
.eyebrow{font-family:var(--disp); font-weight:700; font-size:12px; letter-spacing:3px; text-transform:uppercase; color:var(--red);}
h1{font-family:var(--disp); font-weight:800; font-size:30px; color:#fff; margin-top:10px;}
.head p{margin-top:10px; color:#9a9ba1; font-size:14.5px;}
.toolbar{display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap;}
.toolbar input, .toolbar select{background:#141416; border:1px solid #232327; color:#e9e9ea; padding:9px 14px; border-radius:8px; font-size:13px; font-family:var(--sans);}
.toolbar .count{font-size:13px; color:#777; margin-left:auto;}
table{width:100%; border-collapse:collapse; background:#141416; border:1px solid #232327; border-radius:14px; overflow:hidden;}
th{text-align:left; font-size:11px; letter-spacing:0.6px; text-transform:uppercase; color:#888; padding:14px 16px; border-bottom:1px solid #232327; background:#191919;}
td{padding:14px 16px; border-bottom:1px solid #1d1d1f; font-size:13.5px; vertical-align:top;}
tr:last-child td{border-bottom:none;}
a{color:var(--red); text-decoration:none;}
a:hover{text-decoration:underline;}
.pill{display:inline-block; font-size:10.5px; font-weight:700; padding:3px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:0.5px;}
.pill.new{background:rgba(232,52,74,.15); color:var(--red);}
.pill.contacted{background:rgba(31,157,98,.15); color:#1f9d62;}
.pill.ignored{background:#232327; color:#888;}
.status-select{background:#0e0e10; border:1px solid #2a2a2e; color:#e9e9ea; font-size:11px; padding:4px 8px; border-radius:6px;}
.empty{padding:60px 20px; text-align:center; color:#777; font-size:14px;}
.muted{color:#666;}
.brand-cell{display:flex; align-items:center; gap:11px;}
.avatar{width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; background:#232327; border:1px solid #2a2a2e;}
.avatar-fallback{width:36px; height:36px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--red),var(--red-deep)); color:#fff; font-family:var(--disp); font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; text-transform:uppercase;}
</style>
</head>
<body>

<div class="wrap">
  <div class="head">
    <span class="eyebrow">Internal · Lead Radar</span>
    <h1>D2C brands worth pitching</h1>
    <p>Auto-discovered via Instagram lookalike crawl + website enrichment. Run <code>node scripts/discover-leads.js</code> to refresh.</p>
  </div>

  <div class="toolbar">
    <input id="search" type="text" placeholder="Search brand or sector...">
    <select id="statusFilter">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="ignored">Ignored</option>
    </select>
    <span class="count" id="count"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>Brand</th>
        <th>Sector</th>
        <th>Followers</th>
        <th>Instagram</th>
        <th>Website</th>
        <th>Email / Phone</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="emptyState" style="display:none;">No leads yet — run the discovery script to populate this list.</div>
</div>

<script>
let allLeads = [];

function pillClass(status) {
  return 'pill ' + (status || 'new');
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  const filtered = allLeads.filter((l) => {
    const matchesSearch = !search || (l.name + l.sector + l.handle).toLowerCase().includes(search);
    const matchesStatus = !statusFilter || l.status === statusFilter;
    return matchesSearch && matchesStatus;
  });

  document.getElementById('count').textContent = filtered.length + ' of ' + allLeads.length + ' leads';
  document.getElementById('emptyState').style.display = allLeads.length === 0 ? 'block' : 'none';

  const rows = document.getElementById('rows');
  rows.innerHTML = filtered.map((l) => `
    <tr>
      <td>
        <div class="brand-cell">
          ${l.avatar
            ? `<img class="avatar" src="/api/leads/avatar?url=${encodeURIComponent(l.avatar)}" alt="" onerror="this.outerHTML='<div class=&quot;avatar-fallback&quot;>${(l.name || l.handle).charAt(0)}</div>'">`
            : `<div class="avatar-fallback">${(l.name || l.handle).charAt(0)}</div>`}
          <div><b>${l.name}</b><br><span class="muted">@${l.handle}</span></div>
        </div>
      </td>
      <td>${l.sector || 'Unknown'}</td>
      <td>${l.followers ? l.followers.toLocaleString('en-IN') : '—'}</td>
      <td><a href="${l.instagram}" target="_blank" rel="noopener">@${l.handle}</a></td>
      <td>${l.website ? `<a href="${l.website}" target="_blank" rel="noopener">${l.website.replace(/^https?:\/\//, '')}</a>` : '<span class="muted">—</span>'}</td>
      <td>${l.email ? `<a href="mailto:${l.email}">${l.email}</a><br>` : ''}${l.phone ? `<span class="muted">${l.phone}</span>` : (!l.email ? '<span class="muted">—</span>' : '')}</td>
      <td>
        <select class="status-select" data-handle="${l.handle}">
          <option value="new" ${l.status === 'new' ? 'selected' : ''}>New</option>
          <option value="contacted" ${l.status === 'contacted' ? 'selected' : ''}>Contacted</option>
          <option value="ignored" ${l.status === 'ignored' ? 'selected' : ''}>Ignored</option>
        </select>
      </td>
    </tr>
  `).join('');

  rows.querySelectorAll('.status-select').forEach((sel) => {
    sel.addEventListener('change', async (e) => {
      const handle = e.target.getAttribute('data-handle');
      await fetch(`/api/leads/${handle}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: e.target.value }),
      });
      const lead = allLeads.find((l) => l.handle === handle);
      if (lead) lead.status = e.target.value;
    });
  });
}

async function load() {
  const res = await fetch('/api/leads');
  allLeads = await res.json();
  render();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);

load();
</script>

</body>
</html>
